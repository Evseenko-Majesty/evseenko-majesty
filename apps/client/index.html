<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/themes.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/splash.css">
</head>
<body>
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="splash-logo">👑</div>
            <div class="splash-title">EVSEENKO MAJESTY</div>
            <div class="splash-status" id="splashStatus">СИСТЕМА ГОТОВА</div>
            <div class="splash-copyright" id="splashCopyright">
                <div>Evseenko Majesty © 2026</div>
                <div>Все права защищены</div>
            </div>
        </div>
    </div>

    <div id="main" style="display: none;">
        <div class="container">
            <div class="screen active" id="screen-home">
                <div class="card">
                    <h1>Главная</h1>
                </div>
            </div>
            <div class="screen" id="screen-settings">
                <div class="card">
                    <h1>Настройки</h1>
                    <div class="setting-item">
                        <span>Имя</span>
                        <span id="userName">—</span>
                    </div>
                    <div class="setting-item">
                        <span>Роль</span>
                        <span id="userRole">Клиент</span>
                    </div>
                    <div class="setting-item">
                        <span>🌐 Язык / Language</span>
                        <div class="lang-buttons">
                            <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
                            <button class="lang-btn" data-lang="en">🇬🇧 English</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" data-screen="home">🏠 Главная</button>
            <button class="nav-item" data-screen="settings">⚙️ Настройки</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // === ТЕМА ===
        function applyTheme() {
            if (tg.colorScheme === 'dark') {
                document.body.classList.add('dark');
            } else {
                document.body.classList.remove('dark');
            }
        }
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);

        // === НАВИГАЦИЯ ===
        function goToScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${screenId}`).classList.add('active');
        }

        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => goToScreen(btn.dataset.screen));
        });

        // === ЯЗЫК (пока заглушка) ===
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                console.log('Язык:', btn.dataset.lang);
                // Пока просто логируем, позже добавим функционал
            });
        });

        // === ЗАГРУЗКА ===
        setTimeout(() => {
            const splash = document.getElementById('splash');
            const main = document.getElementById('main');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                main.style.display = 'block';
            }, 400);
        }, 3000);
    </script>
</body>
</html>
