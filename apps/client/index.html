<!DOCTYPE html>
<!-- ============================================

   ============================================ -->
<html lang="ru">
<head>
  <!-- Кодировка -->
  <meta charset="UTF-8">
  
  <!-- Адаптация под мобильные и Telegram -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- Заголовок вкладки -->
  <title>Evseenko Majesty</title>
  
  <!-- Telegram WebApp SDK (нужен для работы внутри Telegram) -->

</head>
<body>
  
  <!-- Корневой контейнер — всё приложение будет здесь -->
  <div id="app"></div>
  
  <!-- Главный JS-файл приложения -->
  <script type="module" src="/apps/client/modules/app.js"></script>
  
</body>
</html>
