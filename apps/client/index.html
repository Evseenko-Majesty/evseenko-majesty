<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-primary-rgb: 255, 255, 255;
            --bg-secondary: #f5f5f5;
            --text-primary: #000000;
            --text-secondary: #8e8e93;
            --accent: #c4a747;
            --border: #e5e5ea;
            --accent-glow: rgba(196, 167, 71, 0.3);
        }

        body.dark {
            --bg-primary: #0B0F14;
            --bg-primary-rgb: 11, 15, 20;
            --bg-secondary: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --accent: #d4af37;
            --border: #2c2c30;
            --accent-glow: rgba(212, 175, 55, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .splash-content {
            text-align: center;
            padding: 20px;
        }

        .splash-logo {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .splash-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 4px;
        }

        .splash-status {
            margin-top: 40px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .splash-copyright {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="splash-logo">👑</div>
            <div class="splash-title">EVSEENKO MAJESTY</div>
            <div class="splash-status">СИСТЕМА ГОТОВА</div>
            <div class="splash-copyright">
                <div>Evseenko Majesty © 2026</div>
                <div>Все права защищены</div>
            </div>
        </div>
    </div>

    <div id="main" style="display: none;">
        <div style="text-align: center; padding: 40px;">
            <h1>Главная</h1>
            <button onclick="window.Telegram.WebApp.close()">Закрыть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Тема
        function applyTheme() {
            if (tg.colorScheme === 'dark') {
                document.body.classList.add('dark');
            } else {
                document.body.classList.remove('dark');
            }
        }
        applyTheme();
        tg.onEvent('themeChanged', applyTheme);

        // Загрузка
        setTimeout(() => {
            const splash = document.getElementById('splash');
            const main = document.getElementById('main');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                main.style.display = 'block';
            }, 400);
        }, 3000);
    </script>
</body>
</html>
