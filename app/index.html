
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Telegram темы — автоматически */
        :root {
            --bg-page: var(--tg-theme-bg-color, #ffffff);
            --bg-card: var(--tg-theme-secondary-bg-color, #f5f5f5);
            --text-primary: var(--tg-theme-text-color, #000000);
            --text-secondary: var(--tg-theme-hint-color, #8e8e93);
            --accent: var(--tg-theme-button-color, #007aff);
            --accent-text: var(--tg-theme-button-text-color, #ffffff);
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        /* AFTERDARK режим (ночной, 22:00–06:00) */
        body.afterdark {
            --bg-page: #0a0a0a;
            --bg-card: #1a1a1a;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --accent: #c4a747;
            --accent-text: #0a0a0a;
            --border: rgba(255, 215, 0, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            padding: 0;
            margin: 0;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 12px 16px 80px 16px;
        }

        /* Карточки */
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }

        /* Баланс */
        .balance-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .balance-item {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.02);
            border-radius: 14px;
        }
        .balance-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }
        .balance-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* Кнопки */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--accent);
            color: var(--accent-text);
        }
        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        /* Быстрые действия */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .action-card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        .action-card:active {
            transform: scale(0.96);
        }
        .action-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        .action-title {
            font-size: 13px;
            font-weight: 500;
        }

        /* Услуги */
        .service-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        .service-card:active {
            background: var(--bg-card);
            margin: 0 -8px;
            padding: 14px 8px;
            border-radius: 12px;
        }
        .service-card:last-child {
            border-bottom: none;
        }
        .service-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .service-icon {
            font-size: 32px;
            width: 48px;
            text-align: center;
        }
        .service-name {
            font-weight: 600;
            font-size: 16px;
        }
        .service-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Заказы */
        .order-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .order-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--bg-card);
        }
        .status-pending { background: rgba(255, 165, 0, 0.15); color: #ffa500; }
        .status-progress { background: rgba(0, 122, 255, 0.15); color: #007aff; }
        .status-completed { background: rgba(52, 199, 89, 0.15); color: #34c759; }
        .status-cancelled { background: rgba(255, 59, 48, 0.15); color: #ff3b30; }

        /* Навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-page);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px 16px;
            backdrop-filter: blur(20px);
            background: rgba(var(--bg-page-rgb), 0.95);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .nav-item.active {
            color: var(--accent);
        }
        .nav-icon {
            font-size: 22px;
        }

        /* Экран */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Адаптация */
        @media (max-width: 480px) {
            .container {
                padding: 12px 12px 80px 12px;
            }
            .quick-actions {
                gap: 8px;
            }
            .balance-value {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="appContainer">
        <!-- Главный экран -->
        <div class="screen" id="screen-main">
            <div class="card">
                <h2 id="greeting" style="margin-bottom: 16px;">Загрузка...</h2>
                <div class="balance-row">
                    <div class="balance-item">
                        <div class="balance-value" id="balance">0</div>
                        <div class="balance-label">₽ Баланс</div>
                    </div>
                    <div class="balance-item">
                        <div class="balance-value" id="bonus">0</div>
                        <div class="balance-label">🎁 Бонусы</div>
                    </div>
                </div>
                <button class="btn btn-outline" id="topupBtn" style="margin-top: 12px;">+ Пополнить</button>
            </div>

            <div class="quick-actions">
                <div class="action-card" onclick="goToScreen('services')">
                    <div class="action-icon">🛠️</div>
                    <div class="action-title">Услуги</div>
                </div>
                <div class="action-card" onclick="goToScreen('history')">
                    <div class="action-icon">📋</div>
                    <div class="action-title">История</div>
                </div>
                <div class="action-card" onclick="goToScreen('profile')">
                    <div class="action-icon">👤</div>
                    <div class="action-title">Профиль</div>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 12px;">📋 Активные заказы</h3>
                <div id="activeOrdersList">Загрузка...</div>
            </div>
        </div>

        <!-- Услуги -->
        <div class="screen" id="screen-services">
            <div class="card">
                <h3>🛠️ Услуги</h3>
                <div id="servicesList"></div>
            </div>
        </div>

        <!-- Создание заказа -->
        <div class="screen" id="screen-order">
            <div class="card">
                <h3 id="orderServiceName">Новый заказ</h3>
                <input type="datetime-local" id="orderDate" class="btn-secondary" style="width: 100%; padding: 12px; border-radius: 12px; margin: 12px 0; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary);">
                <textarea id="orderComment" placeholder="Комментарий к заказу" rows="3" style="width: 100%; padding: 12px; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); margin-bottom: 12px;"></textarea>
                <button class="btn" id="confirmOrderBtn">Подтвердить заказ</button>
                <button class="btn btn-secondary" onclick="goToScreen('services')" style="margin-top: 8px;">Назад</button>
            </div>
        </div>

        <!-- История -->
        <div class="screen" id="screen-history">
            <div class="card">
                <h3>📋 История заказов</h3>
                <div id="historyList">Загрузка...</div>
            </div>
        </div>

        <!-- Профиль -->
        <div class="screen" id="screen-profile">
            <div class="card">
                <h3>👤 Профиль</h3>
                <div style="margin: 16px 0;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                        <span>Имя</span>
                        <span id="profileName">—</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                        <span>Telegram ID</span>
                        <span id="profileId">—</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                        <span>Роль</span>
                        <span id="profileRole">Клиент</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                        <span>Уровень</span>
                        <span id="profileLevel">Стандарт</span>
                    </div>
                </div>
                <button class="btn btn-secondary" id="notificationsBtn">🔔 Настройки уведомлений</button>
                <button class="btn btn-secondary" style="margin-top: 8px;" id="closeBtn">✖️ Закрыть</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" data-screen="main"><span class="nav-icon">🏠</span><span>Главная</span></button>
        <button class="nav-item" data-screen="services"><span class="nav-icon">🛠️</span><span>Услуги</span></button>
        <button class="nav-item" data-screen="history"><span class="nav-icon">📋</span><span>История</span></button>
        <button class="nav-item" data-screen="profile"><span class="nav-icon">👤</span><span>Профиль</span></button>
    </div>

    <script>
        // --- НАСТРОЙКИ (ЗАМЕНИ НА СВОИ) ---
        const SUPABASE_URL = 'https://dgqlbvajznobyitubazo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRncWxidmFqem5vYnlpdHViYXpvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Mzg1MjcyMSwiZXhwIjoyMDg5NDI4NzIxfQ.iTNnvDhM7cZ5W5oWpTMVNLfbAAtZKZAq_mjhzqSAzUc';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // --- Telegram WebApp ---
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // AFTERDARK режим (22:00–06:00 по геопозиции)
        function checkAfterdark() {
            const now = new Date();
            const hours = now.getHours();
            const isAfterdark = hours >= 22 || hours < 6;
            if (isAfterdark) {
                document.body.classList.add('afterdark');
            } else {
                document.body.classList.remove('afterdark');
            }
        }
        checkAfterdark();
        
        // Автоматическая тема Telegram
        document.body.style.backgroundColor = 'var(--bg-page)';
        
        // Данные пользователя
        const user = tg.initDataUnsafe?.user;
        let currentUser = null;
        let selectedService = null;
        
        // Услуги
        const services = [
            { id: 'wash', name: '🚿 Мойка', desc: 'Бесконтактная, пена, воск', price: 'от 300 ₽', icon: '🚿' },
            { id: 'detailing', name: '✨ Детейлинг', desc: 'Полировка, химчистка, керамика', price: 'от 3000 ₽', icon: '✨' },
            { id: 'tuning', name: '🔧 Тюнинг', desc: 'Обвесы, диски, чип-тюнинг', price: 'от 5000 ₽', icon: '🔧' },
            { id: 'service', name: '🏭 Сервис', desc: 'Диагностика, ремонт, обслуживание', price: 'от 1000 ₽', icon: '🏭' }
        ];
        
        // Рендер услуг
        function renderServices() {
            const container = document.getElementById('servicesList');
            if (!container) return;
            container.innerHTML = services.map(s => `
                <div class="service-card" onclick="selectService('${s.id}', '${s.name}')">
                    <div class="service-info">
                        <div class="service-icon">${s.icon}</div>
                        <div>
                            <div class="service-name">${s.name}</div>
                            <div class="service-desc">${s.desc}</div>
                        </div>
                    </div>
                    <div style="color: var(--accent); font-weight: 500;">${s.price}</div>
                </div>
            `).join('');
        }
        
        function selectService(id, name) {
            selectedService = { id, name };
            document.getElementById('orderServiceName').innerHTML = `📝 ${name}`;
            goToScreen('order');
        }
        
        // Загрузка данных пользователя
        async function loadUserData() {
            if (!user) return;
            
            try {
                let { data: dbUser, error } = await supabase
                    .from('majesty_users')
                    .select('*')
                    .eq('telegram_id', user.id)
                    .single();
                
                if (error && error.code !== 'PGRST116') {
                    console.error('Ошибка:', error);
                }
                
                if (!dbUser) {
                    const { data: newUser, error: insertError } = await supabase
                        .from('majesty_users')
                        .insert({
                            telegram_id: user.id,
                            first_name: user.first_name,
                            username: user.username,
                            role: 'client',
                            balance: 0,
                            bonus_points: 0
                        })
                        .select()
                        .single();
                    
                    if (insertError) throw insertError;
                    dbUser = newUser;
                }
                
                currentUser = dbUser;
                
                // Обновляем UI
                document.getElementById('greeting').innerHTML = `👋 Привет, ${user.first_name || 'Друг'}!`;
                document.getElementById('balance').innerText = currentUser.balance || 0;
                document.getElementById('bonus').innerText = currentUser.bonus_points || 0;
                document.getElementById('profileName').innerText = currentUser.first_name || user.first_name;
                document.getElementById('profileId').innerText = user.id;
                document.getElementById('profileRole').innerText = getRoleName(currentUser.role);
                
                // Уровень по бонусам
                const level = getLevelByBonus(currentUser.bonus_points);
                document.getElementById('profileLevel').innerHTML = `${level.icon} ${level.name}`;
                
                // Загружаем заказы
                await loadOrders();
                
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('greeting').innerHTML = '⚠️ Ошибка загрузки';
            }
        }
        
        function getRoleName(role) {
            const roles = { client: 'Клиент', master: 'Мастер', admin: 'Администратор', owner: 'Владелец' };
            return roles[role] || role;
        }
        
        function getLevelByBonus(points) {
            if (points >= 5000) return { name: 'Majesty Elite', icon: '👑' };
            if (points >= 1000) return { name: 'Премиум', icon: '⭐' };
            if (points >= 100) return { name: 'Активный', icon: '🌟' };
            return { name: 'Стандарт', icon: '✨' };
        }
        
        async function loadOrders() {
            if (!user) return;
            
            const { data: orders } = await supabase
                .from('majesty_orders')
                .select('*')
                .eq('client_id', user.id)
                .order('created_at', { ascending: false });
            
            // Активные заказы (не завершены)
            const activeOrders = orders?.filter(o => o.status !== 'completed' && o.status !== 'cancelled') || [];
            const historyOrders = orders || [];
            
            renderActiveOrders(activeOrders);
            renderHistoryOrders(historyOrders);
        }
        
        function renderActiveOrders(orders) {
            const container = document.getElementById('activeOrdersList');
            if (!container) return;
            
            if (orders.length === 0) {
                container.innerHTML = '<div style="color: var(--text-secondary); text-align: center;">Нет активных заказов</div>';
                return;
            }
            
            container.innerHTML = orders.map(order => `
                <div class="order-item" onclick="alert('Заказ #${order.id}\nУслуга: ${order.service_type}\nСтатус: ${getStatusText(order.status)}')">
                    <div class="order-header">
                        <span>${order.service_type}</span>
                        <span class="order-status status-${order.status}">${getStatusText(order.status)}</span>
                    </div>
                    <div style="font-size: 12px; color: var(--text-secondary);">${order.created_at ? new Date(order.created_at).toLocaleDateString() : ''}</div>
                </div>
            `).join('');
        }
        
        function renderHistoryOrders(orders) {
            const container = document.getElementById('historyList');
            if (!container) return;
            
            if (orders.length === 0) {
                container.innerHTML = '<div style="color: var(--text-secondary); text-align: center;">Нет заказов</div>';
                return;
            }
            
            container.innerHTML = orders.map(order => `
                <div class="order-item">
                    <div class="order-header">
                        <span>${order.service_type}</span>
                        <span class="order-status status-${order.status}">${getStatusText(order.status)}</span>
                    </div>
                    <div style="font-size: 14px; margin: 8px 0;">${order.description || '—'}</div>
                    <div style="display: flex; justify-content: space-between;">
                        <span style="color: var(--accent);">${order.price || 0} ₽</span>
                        <span style="font-size: 12px; color: var(--text-secondary);">${order.created_at ? new Date(order.created_at).toLocaleDateString() : ''}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function getStatusText(status) {
            const statuses = { pending: 'Ожидает', progress: 'В работе', completed: 'Выполнен', cancelled: 'Отменён' };
            return statuses[status] || status;
        }
        
        // Создание заказа
        async function createOrder() {
            if (!selectedService) {
                alert('Выберите услугу');
                return;
            }
            
            const date = document.getElementById('orderDate').value;
            const comment = document.getElementById('orderComment').value;
            
            const { data, error } = await supabase
                .from('majesty_orders')
                .insert({
                    client_id: user.id,
                    service_type: selectedService.name,
                    description: comment || 'Без комментария',
                    status: 'pending',
                    price: 0
                })
                .select();
            
            if (error) {
                alert('Ошибка: ' + error.message);
            } else {
                alert('✅ Заказ создан! Мы свяжемся с вами');
                document.getElementById('orderComment').value = '';
                document.getElementById('orderDate').value = '';
                selectedService = null;
                goToScreen('main');
                await loadOrders();
            }
        }
        
        // Навигация
        function goToScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(`screen-${screenId}`).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.screen === screenId) {
                    btn.classList.add('active');
                }
            });
            
            if (screenId === 'services') renderServices();
            if (screenId === 'main') loadOrders();
        }
        
        // Пополнение
        document.getElementById('topupBtn')?.addEventListener('click', () => {
            tg.showPopup({
                title: 'Пополнение баланса',
                message: 'Скоро здесь появится возможность пополнения. Следите за обновлениями!',
                buttons: [{ type: 'close' }]
            });
        });
        
        document.getElementById('notificationsBtn')?.addEventListener('click', () => {
            tg.showPopup({
                title: 'Уведомления',
                message: 'Настройки уведомлений будут доступны в ближайшее время',
                buttons: [{ type: 'close' }]
            });
        });
        
        document.getElementById('confirmOrderBtn')?.addEventListener('click', createOrder);
        document.getElementById('closeBtn')?.addEventListener('click', () => tg.close());
        
        // Инициализация
        renderServices();
        loadUserData();
        
        // Навигация по кликам
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                goToScreen(btn.dataset.screen);
            });
        });
        
        // Экспорт для onclick
        window.goToScreen = goToScreen;
        window.selectService = selectService;
    </script>
</body>
</html>
