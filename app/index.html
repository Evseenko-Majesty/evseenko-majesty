<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Evseenko Majesty</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

:root {
--bg-primary:#ffffff;
--bg-primary-rgb:255,255,255;
--bg-secondary:#f5f5f5;
--text-primary:#000;
--text-secondary:#8e8e93;
--accent:#c4a747;
--border:#e5e5ea;
}

body.dark {
--bg-primary:#0B0F14;
--bg-primary-rgb:11,15,20;
--bg-secondary:#1c1c1e;
--text-primary:#fff;
--text-secondary:#98989e;
--accent:#d4af37;
--border:#2c2c30;
}

body {
font-family:-apple-system;
background:var(--bg-primary);
color:var(--text-primary);
}

/* SPLASH */
.splash {
position:fixed;
inset:0;
background:var(--bg-primary);
z-index:9999;
transition:0.4s;
}

.splash-content {
position:relative;
height:100vh;
max-width:400px;
margin:auto;
}

/* Анимации */
.fade {
opacity:0;
transform:translateY(10px) scale(0.96);
transition:0.6s cubic-bezier(0.2,0.9,0.4,1);
}
.fade.active {
opacity:1;
transform:translateY(0) scale(1);
}

/* ЛОГО */
.splash-logo-wrapper {
position:absolute;
top:20%;
left:50%;
transform:translate(-50%,-50%);
}
.splash-logo {
font-size:90px;
animation:pulse 2s infinite;
}
@keyframes pulse {
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

/* ТЕКСТ */
.splash-brand {top:35%;}
.splash-tagline {top:50%;}
.splash-status-wrapper {top:70%;}

.splash-brand,
.splash-tagline,
.splash-status-wrapper {
position:absolute;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:100%;
}

.splash-title {letter-spacing:6px;color:var(--accent);}
.splash-status {
padding:8px 20px;
border-radius:30px;
border:1px solid var(--accent);
color:var(--accent);
display:inline-block;
}

.splash-copyright {
position:absolute;
bottom:5%;
width:100%;
text-align:center;
font-size:10px;
opacity:0.4;
}

/* MAIN */
.container {
max-width:500px;
margin:auto;
padding:20px 16px 90px;
}

.screen {display:none;opacity:0;transition:0.3s;}
.screen.active {display:block;opacity:1;}

.card {
background:var(--bg-secondary);
padding:20px;
border-radius:14px;
margin-bottom:16px;
}

/* NAV */
.bottom-nav {
position:fixed;
bottom:3vh;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:420px;
height:65px;

background:rgba(15,15,15,0.6);
backdrop-filter:blur(30px);

border-radius:32px;
display:flex;
align-items:center;
z-index:1000;
}

.nav-indicator {
position:absolute;
height:80%;
width:50%;
left:0;
top:50%;
transform:translateY(-50%);
background:rgba(255,255,255,0.08);
border-radius:20px;
transition:0.35s cubic-bezier(0.2,0.9,0.4,1);
}

.nav-item {
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:10px;
color:var(--text-secondary);
border:none;
background:none;
z-index:2;
}

.nav-item.active {color:white;}

.nav-icon {width:22px;height:22px;}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="splash">
<div class="splash-content">

<div class="splash-logo-wrapper fade">
<div class="splash-logo">👑</div>
</div>

<div class="splash-brand fade">
<div class="splash-title">EVSEENKO MAJESTY</div>
</div>

<div class="splash-tagline fade">
<div>Drive Beyond Limits</div>
</div>

<div class="splash-status-wrapper fade">
<div class="splash-status">SYSTEM READY</div>
</div>

<div class="splash-copyright">
Evseenko Majesty © 2026
</div>

</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<div class="container">
<div class="screen active" id="screen-home">
<div class="card"><h1>Главная</h1></div>
</div>

<div class="screen" id="screen-settings">
<div class="card"><h1>Настройки</h1></div>
</div>
</div>

<div class="bottom-nav">
<div class="nav-indicator"></div>

<button class="nav-item active" data-screen="home">
<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
<path d="M3 9L12 3L21 9L12 15L3 9Z"/>
</svg>
<span>Главная</span>
</button>

<button class="nav-item" data-screen="settings">
<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
<circle cx="12" cy="12" r="3"/>
</svg>
<span>Настройки</span>
</button>

</div>
</div>
<script>
const tg = window.Telegram.WebApp;

// === INIT ===
tg.ready();
tg.expand();

// === HAPTIC ===
function vibrate(type = "light") {
    try {
        tg.HapticFeedback.impactOccurred(type);
    } catch(e) {}
}

// === API ===
const API_URL = 'https://evseenko-majesty-bot.onrender.com';
let currentUser = null;

// === AUTH ===
async function authorize(data) {
    try {
        const res = await fetch(`${API_URL}/api/user`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(data)
        });

        const json = await res.json();
        if (json.success) {
            currentUser = json.user;
            return true;
        }
        return false;
    } catch(e) {
        console.error(e);
        return false;
    }
}

// === UI ===
function updateUI() {
    if (!currentUser) return;

    document.getElementById('userName').innerText = currentUser.name;

    const roles = {
        client:'Клиент',
        master:'Мастер',
        admin:'Администратор'
    };

    document.getElementById('userRole').innerText =
        roles[currentUser.role] || 'Владелец';
}

// === INIT APP ===
async function initApp() {
    const user = tg.initDataUnsafe?.user;

    if (user) {
        const ok = await authorize({
            telegram_id: user.id,
            first_name: user.first_name,
            username: user.username
        });

        if (ok) updateUI();
    }
}

// === LANGUAGE ===
let currentLang = localStorage.getItem('app_lang') || 'ru';

function updateLanguage() {
    const texts = {
        ru: {
            home:'Главная',
            settings:'Настройки'
        },
        en: {
            home:'Home',
            settings:'Settings'
        }
    };

    const t = texts[currentLang];

    document.querySelector('#screen-home h1').innerText = t.home;
    document.querySelector('#screen-settings h1').innerText = t.settings;

    const navItems = document.querySelectorAll('.nav-item');
    navItems[0].querySelector('span').innerText = t.home;
    navItems[1].querySelector('span').innerText = t.settings;
}

function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('app_lang', lang);
    updateLanguage();
    vibrate("light");
}

// === THEME ===
function applyTheme() {
    if (tg.colorScheme === 'dark') {
        document.body.classList.add('dark');
    } else {
        document.body.classList.remove('dark');
    }
}

tg.onEvent('themeChanged', applyTheme);

// === NAVIGATION ===
function goToScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

    const target = document.getElementById(`screen-${id}`);
    if (target) target.classList.add('active');

    vibrate("light");
}

function initNavigation() {
    const items = document.querySelectorAll('.nav-item');
    const indicator = document.querySelector('.nav-indicator');

    items.forEach((btn, index) => {
        btn.addEventListener('click', () => {

            goToScreen(btn.dataset.screen);

            document.querySelector('.nav-item.active')?.classList.remove('active');
            btn.classList.add('active');

            indicator.style.left = `${index * 50}%`;

            vibrate("medium");
        });
    });
}

// === LANGUAGE BUTTONS ===
function initLangButtons() {
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            setLanguage(btn.dataset.lang);
        });
    });
}

// === SPLASH (УЛУЧШЕННЫЙ) ===
function startSplash() {
    applyTheme();
    updateLanguage();

    const splash = document.getElementById('splash');
    const main = document.getElementById('main');

    const logo = document.querySelector('.splash-logo-wrapper');
    const brand = document.querySelector('.splash-brand');
    const tagline = document.querySelector('.splash-tagline');
    const status = document.querySelector('.splash-status-wrapper');

    // анимация появления
    setTimeout(() => logo?.classList.add('active'), 200);
    setTimeout(() => brand?.classList.add('active'), 600);
    setTimeout(() => tagline?.classList.add('active'), 1000);
    setTimeout(() => status?.classList.add('active'), 1400);

    // выход
    setTimeout(() => {
        splash.style.opacity = '0';

        setTimeout(() => {
            splash.style.display = 'none';
            main.style.display = 'block';

            initNavigation();
            initLangButtons();
            initApp();

        }, 400);

    }, 4000);
}

// === START ===
document.addEventListener('DOMContentLoaded', startSplash);
</script>

</body>
</html>
