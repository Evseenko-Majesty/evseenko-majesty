<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ========== БАЗОВЫЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* === ПЕРЕМЕННЫЕ СВЕТЛОЙ ТЕМЫ === */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #000000;
            --text-secondary: #8e8e93;
            --accent: #c4a747;
            --border: #e5e5ea;
        }

        /* === ТЁМНАЯ ТЕМА === */
        body.dark {
            --bg-primary: #0B0F14;
            --bg-secondary: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --accent: #d4af37;
            --border: #2c2c30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.2s ease, color 0.2s ease;
        }

        /* === ЗАГРУЗОЧНЫЙ ЭКРАН === */
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .splash-content {
            text-align: center;
            padding: 20px;
        }

        .splash-logo {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .splash-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 4px;
        }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        .main {
            display: none;
            padding: 40px 20px;
            text-align: center;
        }

        .main h1 {
            font-size: 28px;
            margin-bottom: 16px;
        }

        .main p {
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px 80px 16px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            border: 0.5px solid var(--border);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-primary);
            border-top: 0.5px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px 16px;
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 30px;
        }

        .nav-item.active {
            color: var(--accent);
        }
        
    </style>
</head>
<body>
    <!-- ЗАГРУЗОЧНЫЙ ЭКРАН -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="splash-logo">👑</div>
            <div class="splash-title">EVSEENKO MAJESTY</div>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="main" class="main">
        <h1>Evseenko Majesty</h1>
        <p>Приложение готово к работе</p>
        <p style="margin-top: 20px; font-size: 12px;">Дальнейшие модули будут добавляться постепенно</p>
    </div>
    <div id="main" style="display: none;">
        <div class="container">
            
            <!-- ГЛАВНЫЙ ЭКРАН -->
            <div class="screen active" id="screen-home">
                <div class="card">
                    <h1>Главная</h1>
                </div>
            </div>

            <!-- ЭКРАН НАСТРОЕК -->
            <div class="screen" id="screen-settings">
                <div class="card">
                    <h1>Настройки</h1>
                </div>
            </div>
        </div>

        <!-- НИЖНЯЯ НАВИГАЦИЯ -->
        <div class="bottom-nav">
            <button class="nav-item active" data-screen="home">🏠 Главная</button>
            <button class="nav-item" data-screen="settings">⚙️ Настройки</button>
        </div>
    </div>

    <script>
        (function() {
            // === TELEGRAM ===
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            
            // === ПРИМЕНЕНИЕ ТЕМЫ ===
            function applyTheme() {
                const theme = tg.colorScheme;
                if (theme === 'dark') {
                    document.body.classList.add('dark');
                } else {
                    document.body.classList.remove('dark');
                }
            }
            
            // === СЛУШАЕМ ИЗМЕНЕНИЕ ТЕМЫ ===
            tg.onEvent('themeChanged', () => {
                applyTheme();
            });
            
            // === АНИМАЦИЯ ЗАГРУЗКИ ===
            function startSplash() {
                applyTheme();
                
                const splash = document.getElementById('splash');
                const main = document.getElementById('main');
                
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        main.style.display = 'block';
                    }, 400);
                }, 1500);
            }
            // === НАВИГАЦИЯ ===
            function goToScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(`screen-${screenId}`).classList.add('active');
                
                document.querySelectorAll('.nav-item').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.screen === screenId) {
                        btn.classList.add('active');
                    }
                });
            }
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => goToScreen(btn.dataset.screen));
            });
            
            startSplash();
        })();
    </script>
</body>
</html>
