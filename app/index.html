<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ========== БАЗОВЫЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* === ПЕРЕМЕННЫЕ === */
        :root {
            --bg-primary: #FFFFFF;
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --accent: #C4A747;
            --accent-glow: rgba(196, 167, 71, 0.2);
        }

        /* ТЁМНАЯ ТЕМА (авто или ручная) */
        body.dark {
            --bg-primary: #0E1116;
            --text-primary: #FFFFFF;
            --text-secondary: #98989E;
            --accent: #D4AF37;
            --accent-glow: rgba(212, 175, 55, 0.2);
        }

        /* AFTERDARK (00:00–06:00) */
        body.afterdark {
    --bg-primary: #0A0F1F;          /* глубокий тёмно-синий */
    --text-primary: #F0F0FC;
    --text-secondary: #A8A8C0;
    --accent: #E5C158;
    --accent-glow: rgba(229, 193, 88, 0.25);
}

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* === ЗАГРУЗОЧНЫЙ ЭКРАН === */
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .splash-content {
            text-align: center;
            padding: 20px;
        }

        /* === ОСНОВНОЙ КОНТЕНТ (ПОКА ПУСТОЙ) === */
        .main {
            display: none;
            padding: 40px 20px;
            text-align: center;
        }
        .main h1 {
            font-size: 28px;
            margin-bottom: 16px;
        }
        .main p {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <!-- ЗАГРУЗОЧНЫЙ ЭКРАН -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <div style="font-size: 80px; margin-bottom: 20px;">👑</div>
            <div style="font-size: 20px; letter-spacing: 4px;">EVSEENKO MAJESTY</div>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="main" class="main">
        <h1>Evseenko Majesty</h1>
        <p>Приложение готово к работе</p>
        <p style="margin-top: 20px; font-size: 12px;">Дальнейшие модули будут добавляться постепенно</p>
    </div>

    <script>
        (function() {
            // === TELEGRAM ===
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            
            // === НАСТРОЙКИ ===
            let isAfterdarkActive = false;
            
            // === AFTERDARK (00:00 - 06:00) ===
            function isAfterdarkTime() {
                const now = new Date();
                const hours = now.getHours();
                return hours >= 0 && hours < 6;
            }
            
            // === ОПРЕДЕЛЕНИЕ ТЕМЫ ===
            function getActiveTheme() {
                if (isAfterdarkTime()) return 'afterdark';
                const tgTheme = tg.colorScheme;
                return tgTheme === 'dark' ? 'dark' : 'light';
            }
            
            // === ПРИМЕНЕНИЕ ТЕМЫ ===
            function applyTheme() {
                const theme = getActiveTheme();
                document.body.classList.remove('dark', 'afterdark');
                if (theme === 'afterdark') {
                    document.body.classList.add('afterdark');
                } else if (theme === 'dark') {
                    document.body.classList.add('dark');
                }
            }
            
            // === СЛУШАЕМ ИЗМЕНЕНИЕ ТЕМЫ ===
            tg.onEvent('themeChanged', () => {
                if (!isAfterdarkTime()) {
                    applyTheme();
                }
            });
            
            // === ПРОВЕРКА ВРЕМЕНИ КАЖДУЮ МИНУТУ ===
            setInterval(() => {
                const wasAfterdark = isAfterdarkActive;
                const nowAfterdark = isAfterdarkTime();
                if (wasAfterdark !== nowAfterdark) {
                    isAfterdarkActive = nowAfterdark;
                    applyTheme();
                }
            }, 60000);
            
            // === АНИМАЦИЯ ЗАГРУЗКИ ===
            function startSplash() {
                applyTheme();
                
                const splash = document.getElementById('splash');
                const main = document.getElementById('main');
                
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        main.style.display = 'block';
                    }, 500);
                }, 2000);
            }
            
            startSplash();
        })();
    </script>
</body>
</html>
