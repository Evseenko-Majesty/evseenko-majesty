
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* === ТЕМЫ === */
        :root {
            --bg-page: var(--tg-theme-bg-color, #ffffff);
            --bg-card: var(--tg-theme-secondary-bg-color, #f5f5f5);
            --text-primary: var(--tg-theme-text-color, #000000);
            --text-secondary: var(--tg-theme-hint-color, #8e8e93);
            --accent: var(--tg-theme-button-color, #007aff);
            --accent-text: var(--tg-theme-button-text-color, #ffffff);
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        /* AFTERDARK (золотая ночная тема) */
        body.afterdark {
            --bg-page: #0a0a0a;
            --bg-card: #141414;
            --text-primary: #e8e8e8;
            --text-secondary: #8a8a8e;
            --accent: #d4af37;
            --accent-text: #0a0a0a;
            --border: rgba(212, 175, 55, 0.2);
        }

        /* Ручная тёмная тема */
        body.dark-theme {
            --bg-page: #0a0a0a;
            --bg-card: #141414;
            --text-primary: #e8e8e8;
            --text-secondary: #8a8a8e;
            --accent: #d4af37;
            --accent-text: #0a0a0a;
            --border: rgba(212, 175, 55, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.2s ease;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 12px 16px 80px 16px;
        }

        /* === КАРТОЧКИ === */
        .card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            border: 0.5px solid var(--border);
            transition: all 0.2s;
        }

        /* === БАЛАНС === */
        .balance-row {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }
        .balance-item {
            flex: 1;
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .balance-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--accent);
            line-height: 1;
        }
        .balance-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* === КНОПКИ === */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--accent);
            color: var(--accent-text);
        }
        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        /* === БЫСТРЫЕ ДЕЙСТВИЯ === */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .quick-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            border: 0.5px solid var(--border);
            transition: all 0.2s;
        }
        .quick-card:active {
            transform: scale(0.96);
            background: var(--accent);
            color: var(--accent-text);
        }
        .quick-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        .quick-title {
            font-size: 12px;
            font-weight: 500;
        }

        /* === НИЖНЯЯ НАВИГАЦИЯ === */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-page);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 20px 16px;
            z-index: 100;
        }
        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .nav-btn.active {
            color: var(--accent);
        }
        .nav-icon {
            font-size: 22px;
        }

        /* === ЭКРАНЫ === */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === НАСТРОЙКИ === */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid var(--border);
        }
        .theme-badge {
            display: flex;
            gap: 10px;
        }
        .theme-option {
            padding: 6px 12px;
            border-radius: 20px;
            background: var(--bg-card);
            border: 0.5px solid var(--border);
            cursor: pointer;
            font-size: 13px;
        }
        .theme-option.active {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
        }

        /* === ЛОГОТИП === */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .logo-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 4px var(--accent));
        }
        .logo-text {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* === ПРОФИЛЬ === */
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 0.5px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- ЭКРАН 1: ГЛАВНЫЙ -->
        <div class="screen active" id="screen-main">
            <div class="card" style="text-align: center;">
                <div class="logo">
                    <span class="logo-icon">👑</span>
                    <span class="logo-text">Evseenko Majesty</span>
                </div>
                <div class="balance-row">
                    <div class="balance-item">
                        <div class="balance-value" id="balance">0</div>
                        <div class="balance-label">₽ Баланс</div>
                    </div>
                    <div class="balance-item">
                        <div class="balance-value" id="bonus">0</div>
                        <div class="balance-label">🎁 Бонусы</div>
                    </div>
                </div>
                <button class="btn btn-outline" id="topupBtn">+ Пополнить</button>
            </div>

            <div class="quick-grid">
                <div class="quick-card" data-action="services">
                    <div class="quick-icon">🛠️</div>
                    <div class="quick-title">Услуги</div>
                </div>
                <div class="quick-card" data-action="history">
                    <div class="quick-icon">📋</div>
                    <div class="quick-title">История</div>
                </div>
                <div class="quick-card" data-action="profile">
                    <div class="quick-icon">👤</div>
                    <div class="quick-title">Профиль</div>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 12px;">📋 Активные</h3>
                <div id="activeOrdersList">Загрузка...</div>
            </div>
        </div>

        <!-- ЭКРАН 2: УСЛУГИ -->
        <div class="screen" id="screen-services">
            <div class="card">
                <h3>🛠️ Услуги</h3>
                <div id="servicesList"></div>
            </div>
        </div>

        <!-- ЭКРАН 3: ИСТОРИЯ -->
        <div class="screen" id="screen-history">
            <div class="card">
                <h3>📋 История</h3>
                <div id="historyList">Нет заказов</div>
            </div>
        </div>

        <!-- ЭКРАН 4: ПРОФИЛЬ -->
        <div class="screen" id="screen-profile">
            <div class="card">
                <h3>👤 Профиль</h3>
                <div class="info-row">
                    <span>Имя</span>
                    <span id="profileName">—</span>
                </div>
                <div class="info-row">
                    <span>Роль</span>
                    <span id="profileRole">Клиент</span>
                </div>
                <div class="info-row">
                    <span>Уровень</span>
                    <span id="profileLevel">✨ Стандарт</span>
                </div>
            </div>
            <div class="card">
                <h3>⚙️ Настройки</h3>
                <div class="setting-row">
                    <span>Тема</span>
                    <div class="theme-badge">
                        <span class="theme-option" data-theme="auto">🌓 Авто</span>
                        <span class="theme-option" data-theme="light">☀️ Светлая</span>
                        <span class="theme-option" data-theme="dark">🌙 Тёмная</span>
                    </div>
                </div>
                <div class="setting-row">
                    <span>Afterdark</span>
                    <span id="afterdarkStatus">🌙 22:00–06:00</span>
                </div>
            </div>
            <button class="btn btn-secondary" id="closeBtn" style="margin-top: 8px;">✖️ Закрыть</button>
        </div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="nav-btn" data-screen="main"><span class="nav-icon">🏠</span><span>Главная</span></button>
        <button class="nav-btn" data-screen="services"><span class="nav-icon">🛠️</span><span>Услуги</span></button>
        <button class="nav-btn" data-screen="history"><span class="nav-icon">📋</span><span>История</span></button>
        <button class="nav-btn" data-screen="profile"><span class="nav-icon">👤</span><span>Профиль</span></button>
    </div>

    <script>
        (function() {
            // ========== НАСТРОЙКИ ==========
            const SUPABASE_URL = 'https://dgqlbvajznobyitubazo.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRncWxidmFqem5vYnlpdHViYXpvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Mzg1MjcyMSwiZXhwIjoyMDg5NDI4NzIxfQ.iTNnvDhM7cZ5W5oWpTMVNLfbAAtZKZAq_mjhzqSAzUc';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            
            const user = tg.initDataUnsafe?.user;
            let currentUser = null;
            
            // ========== ТЕМЫ ==========
            let currentTheme = localStorage.getItem('theme') || 'auto';
            
            function applyTheme() {
                const isAfterdarkTime = () => {
                    const hours = new Date().getHours();
                    return hours >= 22 || hours < 6;
                };
                
                document.body.classList.remove('dark-theme', 'afterdark');
                
                if (currentTheme === 'light') {
                    document.body.style.removeProperty('--bg-page');
                } else if (currentTheme === 'dark') {
                    document.body.classList.add('dark-theme');
                } else if (currentTheme === 'auto') {
                    if (isAfterdarkTime()) {
                        document.body.classList.add('afterdark');
                    }
                }
                
                document.querySelectorAll('.theme-option').forEach(opt => {
                    opt.classList.remove('active');
                    if (opt.dataset.theme === currentTheme) opt.classList.add('active');
                });
            }
            
            function setTheme(theme) {
                currentTheme = theme;
                localStorage.setItem('theme', theme);
                applyTheme();
            }
            
            // ========== ПОЛЬЗОВАТЕЛЬ ==========
            async function loadUser() {
                if (!user) return;
                
                const { data } = await supabase
                    .from('majesty_users')
                    .select('*')
                    .eq('telegram_id', user.id)
                    .single();
                
                if (data) {
                    currentUser = data;
                } else {
                    const { data: newUser } = await supabase
                        .from('majesty_users')
                        .insert({
                            telegram_id: user.id,
                            first_name: user.first_name,
                            role: 'client',
                            balance: 0,
                            bonus_points: 0
                        })
                        .select()
                        .single();
                    currentUser = newUser;
                }
                
                document.getElementById('balance').innerText = currentUser?.balance || 0;
                document.getElementById('bonus').innerText = currentUser?.bonus_points || 0;
                document.getElementById('profileName').innerText = user?.first_name || 'Друг';
                document.getElementById('profileRole').innerText = currentUser?.role === 'client' ? 'Клиент' : currentUser?.role;
                
                const level = getLevel(currentUser?.bonus_points || 0);
                document.getElementById('profileLevel').innerHTML = level;
            }
            
            function getLevel(points) {
                if (points >= 5000) return '👑 Majesty Elite';
                if (points >= 1000) return '⭐ Премиум';
                if (points >= 100) return '🌟 Активный';
                return '✨ Стандарт';
            }
            
            // ========== УСЛУГИ (заглушка) ==========
            const services = [
                { icon: '🚿', name: 'Мойка', desc: 'Бесконтактная, пена, воск' },
                { icon: '✨', name: 'Детейлинг', desc: 'Полировка, химчистка' },
                { icon: '🔧', name: 'Тюнинг', desc: 'Обвесы, чип-тюнинг' },
                { icon: '🏭', name: 'Сервис', desc: 'Диагностика, ремонт' }
            ];
            
            function renderServices() {
                const container = document.getElementById('servicesList');
                if (!container) return;
                container.innerHTML = services.map(s => `
                    <div class="service-card" style="display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 0.5px solid var(--border);">
                        <div style="display: flex; gap: 12px;">
                            <span style="font-size: 28px;">${s.icon}</span>
                            <div>
                                <div style="font-weight: 500;">${s.name}</div>
                                <div style="font-size: 12px; color: var(--text-secondary);">${s.desc}</div>
                            </div>
                        </div>
                        <span style="color: var(--accent);">Скоро</span>
                    </div>
                `).join('');
            }
            
            // ========== НАВИГАЦИЯ ==========
            function goToScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                const target = document.getElementById(`screen-${screenId}`);
                if (target) target.classList.add('active');
                
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.screen === screenId) btn.classList.add('active');
                });
                
                if (screenId === 'services') renderServices();
            }
            
            // ========== ИНИЦИАЛИЗАЦИЯ ==========
            applyTheme();
            loadUser();
            renderServices();
            
            // ========== СОБЫТИЯ ==========
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => goToScreen(btn.dataset.screen));
            });
            
            document.querySelectorAll('.quick-card').forEach(card => {
                card.addEventListener('click', () => {
                    const action = card.dataset.action;
                    if (action === 'services') goToScreen('services');
                    if (action === 'history') goToScreen('history');
                    if (action === 'profile') goToScreen('profile');
                });
            });
            
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.addEventListener('click', () => setTheme(opt.dataset.theme));
            });
            
            document.getElementById('topupBtn')?.addEventListener('click', () => {
                tg.showPopup({
                    title: 'Пополнение',
                    message: 'Скоро появится',
                    buttons: [{ type: 'close' }]
                });
            });
            
            document.getElementById('closeBtn')?.addEventListener('click', () => tg.close());
        })();
    </script>
</body>
</html>
