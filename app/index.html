<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* === ПЕРЕМЕННЫЕ === */
        :root {
            --bg-primary: #FFFFFF;
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --accent: #C4A747;
            --accent-glow: rgba(196, 167, 71, 0.2);
        }

        /* === ТЁМНАЯ ТЕМА === */
        body.dark {
            --bg-primary: #000000;
            --text-primary: #FFFFFF;
            --text-secondary: #98989E;
            --accent: #D4AF37;
            --accent-glow: rgba(212, 175, 55, 0.15);
        }

        /* === AFTERDARK === */
        body.afterdark {
            --bg-primary: #03030A;
            --text-primary: #F0F0F0;
            --text-secondary: #9E9EAE;
            --accent: #E5C158;
            --accent-glow: rgba(229, 193, 88, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* === ЗАГРУЗОЧНЫЙ ЭКРАН === */
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .splash-content {
            text-align: center;
            max-width: 320px;
            padding: 20px;
        }

        .splash-logo {
            width: 90px;
            height: auto;
            margin-bottom: 28px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        .splash-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 4px;
            opacity: 0;
            transition: opacity 0.4s ease;
            position: relative;
            display: inline-block;
        }

        .splash-afterdark-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 400;
            letter-spacing: 2px;
            margin-left: 8px;
            vertical-align: middle;
            opacity: 0.8;
        }

        .splash-tagline {
            margin-top: 32px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .splash-tagline-primary {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .splash-tagline-secondary {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        .splash-status {
            margin-top: 48px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .splash-line {
            width: 40px;
            height: 1px;
            background: var(--accent);
            margin: 24px auto 0;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .splash-copyright {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            opacity: 0.4;
            letter-spacing: 0.5px;
            transition: opacity 0.4s ease;
        }
        .splash-copyright div:first-child {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div id="splash" class="splash">
        <div class="splash-content">
            <!-- Логотип -->
            <img src="/images/logo.svg" alt="Evseenko Majesty" class="splash-logo" id="splashLogo">
            
            <!-- Название + AFTERDARK бейдж -->
            <div id="splashTitleWrapper" style="opacity: 0; transition: opacity 0.4s ease;">
                <span class="splash-title">EVSEENKO MAJESTY</span>
                <span id="afterdarkBadge" class="splash-afterdark-badge" style="display: none;">AFTERDARK</span>
            </div>
            
            <!-- Слоган (две строки) -->
            <div class="splash-tagline" id="splashTagline">
                <div class="splash-tagline-primary" id="taglinePrimary"></div>
                <div class="splash-tagline-secondary" id="taglineSecondary"></div>
            </div>
            
            <!-- Статус -->
            <div class="splash-status" id="splashStatus">СИСТЕМА ГОТОВА</div>
            <div class="splash-line"></div>
        </div>
        
        <!-- Копирайт -->
        <div class="splash-copyright" id="splashCopyright">
            <div>© 2026 Evseenko Majesty</div>
            <div id="copyrightLine2">Все права защищены</div>
        </div>
    </div>

    <script>
        (function() {
            // === TELEGRAM ===
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            
            // === НАСТРОЙКИ ===
            let userLanguage = localStorage.getItem('userLanguage') || 'ru';
            let isAfterdarkActive = false;
            
            // === ОПРЕДЕЛЕНИЕ AFTERDARK (00:00 - 06:00) ===
            function isAfterdarkTime() {
                const now = new Date();
                const hours = now.getHours();
                return hours >= 0 && hours < 6;
            }
            
            // === ОПРЕДЕЛЕНИЕ ТЕМЫ (авто + AFTERDARK) ===
            function getActiveTheme() {
                if (isAfterdarkTime()) return 'afterdark';
                const tgTheme = tg.colorScheme;
                return tgTheme === 'dark' ? 'dark' : 'light';
            }
            
            // === ПРИМЕНЕНИЕ ТЕМЫ ===
            function applyTheme() {
                const theme = getActiveTheme();
                isAfterdarkActive = (theme === 'afterdark');
                document.body.classList.remove('dark', 'afterdark');
                if (theme === 'afterdark') {
                    document.body.classList.add('afterdark');
                } else if (theme === 'dark') {
                    document.body.classList.add('dark');
                }
            }
            
            // === ОБНОВЛЕНИЕ ТЕКСТОВ ===
            function updateTexts() {
                const primary = document.getElementById('taglinePrimary');
                const secondary = document.getElementById('taglineSecondary');
                const status = document.getElementById('splashStatus');
                const copyrightLine2 = document.getElementById('copyrightLine2');
                const afterdarkBadge = document.getElementById('afterdarkBadge');
                
                // AFTERDARK бейдж
                if (isAfterdarkActive) {
                    afterdarkBadge.style.display = 'inline-block';
                    afterdarkBadge.textContent = userLanguage === 'ru' ? 'AFTERDARK' : 'AFTERDARK';
                } else {
                    afterdarkBadge.style.display = 'none';
                }
                
                // Слоган
                if (userLanguage === 'ru') {
                    primary.textContent = 'Двигайся за пределами';
                    secondary.textContent = 'Drive Beyond Limits';
                } else {
                    primary.textContent = 'Drive Beyond Limits';
                    secondary.textContent = 'Двигайся за пределами';
                }
                
                // Статус
                if (isAfterdarkActive) {
                    status.textContent = userLanguage === 'ru' ? 'AFTERDARK АКТИВЕН' : 'AFTERDARK ACTIVE';
                } else {
                    status.textContent = userLanguage === 'ru' ? 'СИСТЕМА ГОТОВА' : 'SYSTEM READY';
                }
                
                // Копирайт
                copyrightLine2.textContent = userLanguage === 'ru' ? 'Все права защищены' : 'All Rights Reserved';
            }
            
            // === СЛУШАЕМ ИЗМЕНЕНИЕ ТЕМЫ TELEGRAM ===
            tg.onEvent('themeChanged', () => {
                if (!isAfterdarkTime()) {
                    applyTheme();
                    updateTexts();
                }
            });
            
            // === ПРОВЕРКА ВРЕМЕНИ КАЖДУЮ МИНУТУ ===
            setInterval(() => {
                const wasAfterdark = isAfterdarkActive;
                applyTheme();
                if (wasAfterdark !== isAfterdarkActive || getActiveTheme() !== (document.body.classList.contains('afterdark') ? 'afterdark' : document.body.classList.contains('dark') ? 'dark' : 'light')) {
                    updateTexts();
                }
            }, 60000);
            
            // === АНИМАЦИЯ ЗАГРУЗОЧНОГО ЭКРАНА ===
            function startSplash() {
                applyTheme();
                updateTexts();
                
                const logo = document.getElementById('splashLogo');
                const titleWrapper = document.getElementById('splashTitleWrapper');
                const tagline = document.getElementById('splashTagline');
                const status = document.getElementById('splashStatus');
                const line = document.querySelector('.splash-line');
                const copyright = document.querySelector('.splash-copyright');
                
                // 1. Логотип (0.3с)
                setTimeout(() => {
                    logo.style.opacity = '1';
                    logo.style.transform = 'scale(1)';
                }, 300);
                
                // 2. Название (1.2с)
                setTimeout(() => {
                    titleWrapper.style.opacity = '1';
                }, 1200);
                
                // 3. Слоган (2.4с)
                setTimeout(() => {
                    tagline.style.opacity = '1';
                }, 2400);
                
                // 4. Статус и линия (3.6с)
                setTimeout(() => {
                    status.style.opacity = '1';
                    line.style.opacity = '1';
                }, 3600);
                
                // 5. Копирайт появляется (4.5с)
                setTimeout(() => {
                    copyright.style.opacity = '0.4';
                }, 4500);
                
                // 6. Переход на главную (7с)
                setTimeout(() => {
                    const splash = document.getElementById('splash');
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        // Здесь будет переход на главный экран приложения
                        console.log('Переход на главный экран');
                        // Пока оставляем пустым — добавим позже
                    }, 500);
                }, 7000);
            }
            
            startSplash();
        })();
    </script>
</body>
</html>
