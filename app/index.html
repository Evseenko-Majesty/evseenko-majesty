<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* === ПРЕМИУМ ПЕРЕМЕННЫЕ === */
       :root {
    --bg-primary: #FEFAF0;      /* молочный, тёплый */
    --bg-gradient: radial-gradient(circle at 50% 30%, rgba(196, 167, 71, 0.03) 0%, rgba(250, 245, 235, 0.8) 100%);
    --bg-glow: radial-gradient(circle at 50% 30%, rgba(196, 167, 71, 0.08) 0%, transparent 70%);
    --text-primary: #1C1C1E;
    --text-secondary: #6C6C70;
    --accent: #C4A747;
    --accent-glow: rgba(196, 167, 71, 0.2);
    --accent-light: rgba(196, 167, 71, 0.08);
}

        /* === ТЁМНАЯ ТЕМА === */

       body.dark {
    --bg-primary: #0C0C0E;           /* глубокий графит */
    --bg-gradient: radial-gradient(circle at 50% 40%, rgba(212, 175, 55, 0.05) 0%, rgba(8, 8, 10, 0.95) 100%);
    --bg-glow: radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.12) 0%, transparent 70%);
    --text-primary: #F5F5F7;
    --text-secondary: #9E9EA4;
    --accent: #D4AF37;
    --accent-glow: rgba(212, 175, 55, 0.3);
    --accent-light: rgba(212, 175, 55, 0.08);
}
body.dark::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 40%, rgba(212, 175, 55, 0.02) 0%, rgba(12, 12, 14, 0.9) 100%);
    pointer-events: none;
    z-index: 0;
    animation: darkBreath 10s ease-in-out infinite;
}
          @keyframes darkBreath {
    0% {
        opacity: 0.3;
        background: radial-gradient(circle at 50% 40%, rgba(212, 175, 55, 0.02) 0%, rgba(10, 10, 12, 0.9) 100%);
    }
    50% {
        opacity: 1.5;
        background: radial-gradient(circle at 50% 40%, rgba(212, 175, 55, 0.17) 0%, rgba(12, 12, 14, 0.98) 100%);
    }
    100% {
        opacity: 0.3;
        background: radial-gradient(circle at 50% 40%, rgba(212, 175, 55, 0.02) 0%, rgba(10, 10, 12, 0.9) 100%);
    }
}

        /* === AFTERDARK === */

        body.afterdark {
    --bg-primary: #04040C;              /* глубокий синевато-чёрный */
    --bg-gradient: radial-gradient(circle at 50% 40%, rgba(0, 100, 200, 0.12) 0%, rgba(4, 4, 12, 0.96) 100%);
    --bg-glow: radial-gradient(circle at 50% 30%, rgba(0, 150, 255, 0.2) 0%, transparent 70%);
    --text-primary: #F0F0FC;
    --text-secondary: #A8A8C0;
    --accent: #E5C158;
    --accent-glow: rgba(229, 193, 88, 0.35);
    --accent-light: rgba(229, 193, 88, 0.1);
    --neon-blue: rgba(0, 120, 220, 0.25);
}

body.afterdark::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 40%, rgba(0, 120, 220, 0.15) 0%, rgba(4, 4, 12, 0.92) 100%);
    pointer-events: none;
    z-index: 0;
    animation: afterdarkBreath 12s ease-in-out infinite;
}
        
body.afterdark {
    box-shadow: inset 0 0 80px rgba(0, 80, 160, 0.15);
}


@keyframes afterdarkBreath {
    0% {
        opacity: 0.5;
        background: radial-gradient(circle at 50% 40%, rgba(0, 100, 200, 0.08) 0%, rgba(4, 4, 12, 0.9) 100%);
    }
    50% {
        opacity: 1;
        background: radial-gradient(circle at 50% 40%, rgba(0, 150, 255, 0.25) 0%, rgba(4, 4, 12, 0.98) 100%);
    }
    100% {
        opacity: 0.5;
        background: radial-gradient(circle at 50% 40%, rgba(0, 100, 200, 0.08) 0%, rgba(4, 4, 12, 0.9) 100%);
    }
}

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }

      
@keyframes softBreath {
    0% {
        opacity: 0.3;
        background: radial-gradient(circle at 50% 30%, rgba(196, 167, 80, 0.02) 0%, rgba(255, 255, 245, 0.6) 100%);
    }
    50% {
        opacity: 1.2;
        background: radial-gradient(circle at 50% 30%, rgba(196, 167, 80, 0.1) 0%, rgba(250, 245, 235, 0.95) 100%);
    }
    100% {
        opacity: 0.3;
        background: radial-gradient(circle at 50% 30%, rgba(196, 167, 80, 0.02) 0%, rgba(255, 255, 245, 0.6) 100%);
    }
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 30%, rgba(196, 167, 71, 0.02) 0%, rgba(255, 255, 245, 0.6) 100%);
    pointer-events: none;
    z-index: 0;
    animation: softBreath 8s ease-in-out infinite;
}

        @keyframes slowPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        /* === ЗАГРУЗОЧНЫЙ ЭКРАН === */
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .splash-content {
            text-align: center;
            max-width: 340px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* ===  ЛОГОТИП === */
       .splash-logo-emoji {
           font-size: 100px
    width: 110px;
    height: auto;
    display: block;
    margin: 0 auto;
    opacity: 0;
    transform: scale(0.85) rotate(-2deg);
    transition: all 0.7s ease;
    filter: drop-shadow(0 0 20px var(--accent-glow));
}


        /* === НАЗВАНИЕ БРЕНДА === */
        .splash-brand {
            margin-top: 8px;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.1s;
        }
        .splash-brand.active {
            opacity: 1;
            transform: translateY(0);
        }
        .brand-name {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
            display: inline-block;
        }
        .brand-name::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.5s ease 0.8s;
        }
        .splash-brand.active .brand-name::after {
            width: 70%;
        }

        /* === AFTERDARK БЕЙДЖ === */
        .afterdark-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 2.5px;
            margin-left: 10px;
            vertical-align: middle;
            color: var(--accent);
            background: var(--accent-light);
            padding: 2px 10px;
            border-radius: 30px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.4s ease 0.3s;
        }
        .afterdark-badge.active {
            opacity: 1;
            transform: scale(1);
        }

        /* === СЛОГАН === */
        .splash-tagline {
            margin-top: 48px;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.2s;
        }
        .splash-tagline.active {
            opacity: 1;
            transform: translateY(0);
        }
        .tagline-primary {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tagline-secondary {
            font-size: 13px;
            opacity: 0.55;
            margin-top: 8px;
            letter-spacing: 0.3px;
            color: var(--text-secondary);
        }

        /* === СТАТУС === */
        .splash-status {
            margin-top: 52px;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.4s ease 0.3s;
            color: var(--accent);
        }
        .splash-status.active {
            opacity: 1;
            transform: translateY(0);
        }
        .status-line {
            width: 45px;
            height: 2px;
            background: var(--accent);
            margin: 20px auto 0;
            opacity: 0;
            transform: scaleX(0);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.4s;
        }
        .status-line.active {
            opacity: 1;
            transform: scaleX(1);
        }

        /* === КОПИРАЙТ === */
        .splash-copyright {
            position: absolute;
            bottom: 35px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease 0.5s;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        .splash-copyright.active {
            opacity: 0.5;
            transform: translateY(0);
        }
        .splash-copyright div:first-child {
            margin-bottom: 4px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="splash" class="splash">
        <div class="splash-content">
            
            <!-- логотип -->
          <div class="splash-logo-wrapper">
    <div class="splash-logo-emoji" id="splashLogo">👑</div>
</div>


            <!-- НАЗВАНИЕ БРЕНДА -->
            <div class="splash-brand" id="splashBrand">
                <span class="brand-name">EVSEENKO MAJESTY</span>
                <span id="afterdarkBadge" class="afterdark-badge">AFTERDARK</span>
            </div>
            
            <!-- СЛОГАН -->
            <div class="splash-tagline" id="splashTagline">
                <div class="tagline-primary" id="taglinePrimary"></div>
                <div class="tagline-secondary" id="taglineSecondary"></div>
            </div>
            
            <!-- СТАТУС -->
            <div class="splash-status" id="splashStatus">СИСТЕМА ГОТОВА</div>
            <div class="status-line" id="statusLine"></div>
        </div>
        
        <!-- КОПИРАЙТ -->
        <div class="splash-copyright" id="splashCopyright">
            <div>© 2026 Evseenko Majesty</div>
            <div id="copyrightLine2">Все права защищены</div>
        </div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            
            let userLanguage = localStorage.getItem('userLanguage') || 'ru';
            let isAfterdarkActive = false;
            
            function isAfterdarkTime() {
                const now = new Date();
                const hours = now.getHours();
                return hours >= 0 && hours < 6;
            }
            
            function getActiveTheme() {
                if (isAfterdarkTime()) return 'afterdark';
                const tgTheme = tg.colorScheme;
                return tgTheme === 'dark' ? 'dark' : 'light';
            }
            
            function applyTheme() {
                const theme = getActiveTheme();
                isAfterdarkActive = (theme === 'afterdark');
                document.body.classList.remove('dark', 'afterdark');
                if (theme === 'afterdark') {
                    document.body.classList.add('afterdark');
                } else if (theme === 'dark') {
                    document.body.classList.add('dark');
                }
            }
            
            function updateTexts() {
                const primary = document.getElementById('taglinePrimary');
                const secondary = document.getElementById('taglineSecondary');
                const status = document.getElementById('splashStatus');
                const copyrightLine2 = document.getElementById('copyrightLine2');
                const badge = document.getElementById('afterdarkBadge');
                
                if (isAfterdarkActive) {
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
                
                if (userLanguage === 'ru') {
                    primary.textContent = 'Двигайся за пределами';
                    secondary.textContent = 'Drive Beyond Limits';
                } else {
                    primary.textContent = 'Drive Beyond Limits';
                    secondary.textContent = 'Двигайся за пределами';
                }
                
                if (isAfterdarkActive) {
                    status.textContent = userLanguage === 'ru' ? 'AFTERDARK АКТИВЕН' : 'AFTERDARK ACTIVE';
                } else {
                    status.textContent = userLanguage === 'ru' ? 'СИСТЕМА ГОТОВА' : 'SYSTEM READY';
                }
                
                copyrightLine2.textContent = userLanguage === 'ru' ? 'Все права защищены' : 'All Rights Reserved';
            }
            
            tg.onEvent('themeChanged', () => {
                if (!isAfterdarkTime()) {
                    applyTheme();
                    updateTexts();
                }
            });
            
            setInterval(() => {
                const wasAfterdark = isAfterdarkActive;
                applyTheme();
                if (wasAfterdark !== isAfterdarkActive) {
                    updateTexts();
                }
            }, 60000);
            
            function startSplash() {
                applyTheme();
                updateTexts();
                
                const logo = document.getElementById('splashLogo');
                const brand = document.getElementById('splashBrand');
                const tagline = document.getElementById('splashTagline');
                const status = document.getElementById('splashStatus');
                const line = document.getElementById('statusLine');
                const copyright = document.getElementById('splashCopyright');
                const badge = document.getElementById('afterdarkBadge');
                
                setTimeout(() => { logo.classList.add('active'); }, 400);
                setTimeout(() => { 
                    brand.classList.add('active'); 
                    if (isAfterdarkActive) badge.classList.add('active');
                }, 1400);
                setTimeout(() => { tagline.classList.add('active'); }, 2400);
                setTimeout(() => { 
                    status.classList.add('active'); 
                    line.classList.add('active'); 
                }, 3600);
                setTimeout(() => { copyright.classList.add('active'); }, 4800);
                setTimeout(() => {
                    const splash = document.getElementById('splash');
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        console.log('✨ Majesty ready');
                    }, 600);
                }, 7000);
            }
            
            startSplash();
        })();
    </script>
</body>
</html>
