<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #FFFFFF;
            color: #1C1C1E;
            transition: all 0.3s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        body.dark {
            background: #0B0F14;
            color: #FFFFFF;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }

        .philosophy {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 40px;
        }

        button {
            background: #D4AF37;
            color: #000;
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">👑</div>
        <h1>Evseenko Majesty</h1>
        <p class="philosophy">от улицы к мастерству</p>
        <button id="themeBtn">🌙 Тёмная тема</button>
    </div>

    <script>
        // Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        // Тёмная тема
        const btn = document.getElementById('themeBtn');
        let isDark = false;

        btn.addEventListener('click', () => {
            isDark = !isDark;
            document.body.classList.toggle('dark', isDark);
            btn.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        });
    </script>
</body>
</html>
