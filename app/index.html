<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #000000;
            --text-secondary: #8e8e93;
            --accent: #c4a747;
            --border: #e5e5ea;
        }

        body.dark {
            --bg-primary: #0B0F14;
            --bg-secondary: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --accent: #d4af37;
            --border: #2c2c30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .splash-content {
            text-align: center;
            padding: 20px;
            position: relative;
            min-height: 280px;
        }

        .splash-logo {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .splash-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 4px;
        }

        .splash-copyright {
            position: absolute;
            bottom: -280px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            opacity: 0.4;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            line-height: 1.4;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px 80px 16px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            border: 0.5px solid var(--border);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-primary);
            border-top: 0.5px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px 16px;
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 30px;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid var(--border);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .lang-buttons {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        /* ========== ПРЕМИУМ АНИМАЦИЯ ЗАГРУЗКИ ========== */
.splash-logo-wrapper {
    opacity: 0;
    transform: scale(0.8) translateY(20px);
    transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.splash-logo-wrapper.active {
    opacity: 1;
    transform: scale(1) translateY(0);
}

.splash-logo {
    font-size: 100px;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 20px var(--accent-glow));
}

.splash-brand {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.1s;
}

.splash-brand.active {
    opacity: 1;
    transform: translateY(0);
}

.splash-title {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.splash-tagline {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.2s;
}

.splash-tagline.active {
    opacity: 1;
    transform: translateY(0);
}

.tagline-primary {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.tagline-secondary {
    font-size: 12px;
    opacity: 0.55;
    margin-top: 6px;
    color: var(--text-secondary);
}

.splash-status-wrapper {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.3s;
}

.splash-status-wrapper.active {
    opacity: 1;
    transform: translateY(0);
}

.splash-status {
    display: inline-block;
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    background: var(--bg-secondary);
    border: 1px solid var(--accent);
    color: var(--accent);
    backdrop-filter: blur(10px);
}

.splash-copyright {
    position: absolute;
    bottom: -280px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    opacity: 0.4;
    color: var(--text-secondary);
    letter-spacing: 0.3px;
    line-height: 1.4;
}
    </style>
</head>
<body>
    <div class="splash-content">
    <div class="splash-logo-wrapper">
        <div class="splash-logo">👑</div>
    </div>
    <div class="splash-brand">
        <div class="splash-title">EVSEENKO MAJESTY</div>
    </div>
    <div class="splash-tagline">
        <div class="tagline-primary" id="taglinePrimary"></div>
        <div class="tagline-secondary" id="taglineSecondary"></div>
    </div>
    <div class="splash-status-wrapper">
        <div class="splash-status" id="splashStatus">СИСТЕМА ГОТОВА</div>
    </div>
    <div class="splash-copyright" id="splashCopyright">
        <div>Evseenko Majesty © 2026</div>
        <div>Все права защищены</div>
    </div>
</div>

    <div id="main" style="display: none;">
        <div class="container">
            <div class="screen active" id="screen-home">
                <div class="card">
                    <h1>Главная</h1>
                </div>
            </div>

            <div class="screen" id="screen-settings">
                <div class="card">
                    <h1>Настройки</h1>
                    <div class="setting-item">
                        <span>🌐 Язык / Language</span>
                        <div class="lang-buttons">
                            <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
                            <button class="lang-btn" data-lang="en">🇬🇧 English</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" data-screen="home">🏠 Главная</button>
            <button class="nav-item" data-screen="settings">⚙️ Настройки</button>
        </div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();

            // === ЯЗЫК ===
            let currentLang = localStorage.getItem('app_lang') || detectLanguage();

            function detectLanguage() {
                const tgLang = tg.initDataUnsafe?.user?.language_code || 'en';
                return tgLang === 'ru' ? 'ru' : 'en';
            }

            function updateLanguage() {
    const texts = {
        ru: {
            home: 'Главная',
            settingsTitle: 'Настройки',
            language: '🌐 Язык / Language',
            navHome: 'Главная',
            navSettings: 'Настройки',
            copyrightLine1: 'Evseenko Majesty © 2026',
            copyrightLine2: 'Все права защищены',
            taglinePrimary: 'Двигайся за пределами',
            taglineSecondary: 'Drive Beyond Limits',
            status: 'СИСТЕМА ГОТОВА'
        },
        en: {
            home: 'Home',
            settingsTitle: 'Settings',
            language: '🌐 Language / Язык',
            navHome: 'Home',
            navSettings: 'Settings',
            copyrightLine1: 'Evseenko Majesty © 2026',
            copyrightLine2: 'All Rights Reserved',
            taglinePrimary: 'Drive Beyond Limits',
            taglineSecondary: 'Двигайся за пределами',
            status: 'SYSTEM READY'
        }
    };
    
    const t = texts[currentLang];
    
    document.getElementById('screen-home').querySelector('h1').innerText = t.home;
    document.getElementById('screen-settings').querySelector('h1').innerText = t.settingsTitle;
    document.querySelector('.setting-item span').innerText = t.language;
    
    const navItems = document.querySelectorAll('.nav-item');
    if (navItems.length >= 2) {
        navItems[0].innerHTML = '🏠 ' + t.navHome;
        navItems[1].innerHTML = '⚙️ ' + t.navSettings;
    }
    
    // Копирайт
    const copyrightDiv = document.getElementById('splashCopyright');
    if (copyrightDiv) {
        copyrightDiv.innerHTML = `
            <div>${t.copyrightLine1}</div>
            <div>${t.copyrightLine2}</div>
        `;
    }
    
    // Слоган
    const taglinePrimary = document.getElementById('taglinePrimary');
    const taglineSecondary = document.getElementById('taglineSecondary');
    if (taglinePrimary) taglinePrimary.innerText = t.taglinePrimary;
    if (taglineSecondary) taglineSecondary.innerText = t.taglineSecondary;
    
    // Статус
    const statusEl = document.getElementById('splashStatus');
    if (statusEl) statusEl.innerText = t.status;
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.lang === currentLang) btn.classList.add('active');
    });
}
                
                const navItems = document.querySelectorAll('.nav-item');
                if (navItems.length >= 2) {
                    navItems[0].innerHTML = '🏠 ' + t.navHome;
                    navItems[1].innerHTML = '⚙️ ' + t.navSettings;
                }
                
                const copyrightDiv = document.getElementById('splashCopyright');
                if (copyrightDiv) {
                    copyrightDiv.innerHTML = `
                        <div>${t.copyrightLine1}</div>
                        <div>${t.copyrightLine2}</div>
                    `;
                }
                
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.lang === currentLang) btn.classList.add('active');
                });
            }

            function setLanguage(lang) {
                currentLang = lang;
                localStorage.setItem('app_lang', lang);
                updateLanguage();
            }

            // === ТЕМА ===
            function applyTheme() {
                const theme = tg.colorScheme;
                if (theme === 'dark') {
                    document.body.classList.add('dark');
                } else {
                    document.body.classList.remove('dark');
                }
            }

            tg.onEvent('themeChanged', () => applyTheme());

            // === НАВИГАЦИЯ ===
            function goToScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(`screen-${screenId}`).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.screen === screenId) btn.classList.add('active');
                });
            }

            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => goToScreen(btn.dataset.screen));
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            });

            // === ЗАГРУЗКА ===
            function startSplash() {
    applyTheme();
    updateLanguage();
    
    const splash = document.getElementById('splash');
    const main = document.getElementById('main');
    const logoWrapper = document.querySelector('.splash-logo-wrapper');
    const brand = document.querySelector('.splash-brand');
    const tagline = document.querySelector('.splash-tagline');
    const statusWrapper = document.querySelector('.splash-status-wrapper');
    
    // Анимация появления
    setTimeout(() => { logoWrapper.classList.add('active'); }, 200);
    setTimeout(() => { brand.classList.add('active'); }, 600);
    setTimeout(() => { tagline.classList.add('active'); }, 1000);
    setTimeout(() => { statusWrapper.classList.add('active'); }, 1400);
    
    // Закрытие через 5 секунд
    setTimeout(() => {
        splash.style.opacity = '0';
        setTimeout(() => {
            splash.style.display = 'none';
            main.style.display = 'block';
        }, 400);
    }, 5000);
}

            startSplash();
        })();
    </script>
</body>
</html>
