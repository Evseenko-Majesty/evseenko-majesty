<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #000000;
            --text-secondary: #8e8e93;
            --accent: #c4a747;
            --border: #e5e5ea;
            --accent-glow: rgba(196, 167, 71, 0.3);
        }

        body.dark {
            --bg-primary: #0B0F14;
            --bg-secondary: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --accent: #d4af37;
            --border: #2c2c30;
            --accent-glow: rgba(212, 175, 55, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .splash-content {
            text-align: center;
            padding: 20px;
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .splash-logo-wrapper {
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-top: -40px;
            margin-bottom: 20px;
        }
        .splash-logo-wrapper.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        .splash-logo {
            font-size: 100px;
            margin-bottom: 0;
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        .splash-brand {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.1s;
            margin-bottom: 30px;
        }
        .splash-brand.active {
            opacity: 1;
            transform: translateY(0);
        }
        .splash-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .splash-tagline {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.2s;
            margin-bottom: 40px;
        }
        .splash-tagline.active {
            opacity: 1;
            transform: translateY(0);
        }
        .tagline-primary {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
            color: var(--accent);
        }
        .tagline-secondary {
            font-size: 12px;
            opacity: 0.55;
            margin-top: 6px;
            color: var(--text-secondary);
        }

        .splash-status-wrapper {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) 0.3s;
            margin-bottom: 20px;
        }
        .splash-status-wrapper.active {
            opacity: 1;
            transform: translateY(0);
        }
        .splash-status {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            color: var(--accent);
            backdrop-filter: blur(10px);
        }

        .splash-copyright {
            position: absolute;
            bottom: -200px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            opacity: 0.4;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            line-height: 1.4;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px 80px 16px;
        }

        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            border: 0.5px solid var(--border);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-primary);
            border-top: 0.5px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px 16px;
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 30px;
        }
        .nav-item.active {
            color: var(--accent);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid var(--border);
        }
        .setting-item:last-child {
            border-bottom: none;
        }

        .lang-buttons {
            display: flex;
            gap: 8px;
        }
        .lang-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="splash-logo-wrapper">
                <div class="splash-logo">👑</div>
            </div>
            <div class="splash-brand">
                <div class="splash-title">EVSEENKO MAJESTY</div>
            </div>
            <div class="splash-tagline">
                <div class="tagline-primary" id="taglinePrimary"></div>
                <div class="tagline-secondary" id="taglineSecondary"></div>
            </div>
            <div class="splash-status-wrapper">
                <div class="splash-status" id="splashStatus">СИСТЕМА ГОТОВА</div>
            </div>
            <div class="splash-copyright" id="splashCopyright">
                <div>Evseenko Majesty © 2026</div>
                <div>Все права защищены</div>
            </div>
        </div>
    </div>

    <div id="main" style="display: none;">
        <div class="container">
            <div class="screen active" id="screen-home">
                <div class="card">
                    <h1>Главная</h1>
                </div>
            </div>

            <div class="screen" id="screen-settings">
                <div class="card">
                    <h1>Настройки</h1>
                    <div class="setting-item">
                        <span>Имя</span>
                        <span id="userName">—</span>
                    </div>
                    <div class="setting-item">
                        <span>Роль</span>
                        <span id="userRole">Клиент</span>
                    </div>
                    <div class="setting-item">
                        <span>🌐 Язык / Language</span>
                        <div class="lang-buttons">
                            <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
                            <button class="lang-btn" data-lang="en">🇬🇧 English</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" data-screen="home">🏠 Главная</button>
            <button class="nav-item" data-screen="settings">⚙️ Настройки</button>
        </div>
    </div>

    <script>
        // === API ===
        const API_URL = 'https://evseenko-majesty-bot.onrender.com';
        let currentUser = null;

        // === АВТОРИЗАЦИЯ ===
        async function authorize(telegramData) {
            try {
                const response = await fetch(`${API_URL}/api/user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(telegramData)
                });
                
                const data = await response.json();
                if (data.success) {
                    currentUser = data.user;
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Auth error:', error);
                return false;
            }
        }

        // === ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ===
        function updateUI() {
            if (currentUser) {
                const userNameEl = document.getElementById('userName');
                const userRoleEl = document.getElementById('userRole');
                if (userNameEl) userNameEl.innerText = currentUser.name;
                if (userRoleEl) {
                    userRoleEl.innerText = 
                        currentUser.role === 'client' ? 'Клиент' : 
                        currentUser.role === 'master' ? 'Мастер' : 
                        currentUser.role === 'admin' ? 'Администратор' : 'Владелец';
                }
            }
        }

        // === ЗАГРУЗКА ПРИЛОЖЕНИЯ ===
        async function initApp() {
            const tg = window.Telegram.WebApp;
            const user = tg.initDataUnsafe?.user;
            
            if (user) {
                const success = await authorize({
                    telegram_id: user.id,
                    first_name: user.first_name,
                    username: user.username
                });
                
                if (success) {
                    updateUI();
                }
            }
        }

        // Основной код приложения
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();

            let currentLang = localStorage.getItem('app_lang') || detectLanguage();

            function detectLanguage() {
                const tgLang = tg.initDataUnsafe?.user?.language_code || 'en';
                return tgLang === 'ru' ? 'ru' : 'en';
            }

            function updateLanguage() {
                const texts = {
                    ru: {
                        home: 'Главная',
                        settingsTitle: 'Настройки',
                        language: '🌐 Язык / Language',
                        navHome: 'Главная',
                        navSettings: 'Настройки',
                        copyrightLine1: 'Evseenko Majesty © 2026',
                        copyrightLine2: 'Все права защищены',
                        taglinePrimary: 'Двигайся за пределами',
                        taglineSecondary: 'Drive Beyond Limits',
                        status: 'СИСТЕМА ГОТОВА'
                    },
                    en: {
                        home: 'Home',
                        settingsTitle: 'Settings',
                        language: '🌐 Language / Язык',
                        navHome: 'Home',
                        navSettings: 'Settings',
                        copyrightLine1: 'Evseenko Majesty © 2026',
                        copyrightLine2: 'All Rights Reserved',
                        taglinePrimary: 'Drive Beyond Limits',
                        taglineSecondary: 'Двигайся за пределами',
                        status: 'SYSTEM READY'
                    }
                };
                
                const t = texts[currentLang];
                
                const homeH1 = document.querySelector('#screen-home h1');
                const settingsH1 = document.querySelector('#screen-settings h1');
                if (homeH1) homeH1.innerText = t.home;
                if (settingsH1) settingsH1.innerText = t.settingsTitle;
                
                const settingSpans = document.querySelectorAll('.setting-item span');
                if (settingSpans.length >= 3) {
                    settingSpans[2].innerText = t.language;
                }
                
                const navItems = document.querySelectorAll('.nav-item');
                if (navItems.length >= 2) {
                    navItems[0].innerHTML = '🏠 ' + t.navHome;
                    navItems[1].innerHTML = '⚙️ ' + t.navSettings;
                }
                
                const copyrightDiv = document.getElementById('splashCopyright');
                if (copyrightDiv) {
                    copyrightDiv.innerHTML = `
                        <div>${t.copyrightLine1}</div>
                        <div>${t.copyrightLine2}</div>
                    `;
                }
                
                const taglinePrimary = document.getElementById('taglinePrimary');
                const taglineSecondary = document.getElementById('taglineSecondary');
                if (taglinePrimary) taglinePrimary.innerText = t.taglinePrimary;
                if (taglineSecondary) taglineSecondary.innerText = t.taglineSecondary;
                
                const statusEl = document.getElementById('splashStatus');
                if (statusEl) statusEl.innerText = t.status;
                
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.lang === currentLang) btn.classList.add('active');
                });
            }

            function setLanguage(lang) {
                currentLang = lang;
                localStorage.setItem('app_lang', lang);
                updateLanguage();
            }

            function applyTheme() {
                const theme = tg.colorScheme;
                if (theme === 'dark') {
                    document.body.classList.add('dark');
                } else {
                    document.body.classList.remove('dark');
                }
            }

            tg.onEvent('themeChanged', () => applyTheme());

            function goToScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                const target = document.getElementById(`screen-${screenId}`);
                if (target) target.classList.add('active');
                document.querySelectorAll('.nav-item').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.screen === screenId) btn.classList.add('active');
                });
            }

            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => goToScreen(btn.dataset.screen));
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            });

            function startSplash() {
                applyTheme();
                updateLanguage();
                
                const splash = document.getElementById('splash');
                const main = document.getElementById('main');
                const logoWrapper = document.querySelector('.splash-logo-wrapper');
                const brand = document.querySelector('.splash-brand');
                const tagline = document.querySelector('.splash-tagline');
                const statusWrapper = document.querySelector('.splash-status-wrapper');
                
                setTimeout(() => { if (logoWrapper) logoWrapper.classList.add('active'); }, 200);
                setTimeout(() => { if (brand) brand.classList.add('active'); }, 600);
                setTimeout(() => { if (tagline) tagline.classList.add('active'); }, 1000);
                setTimeout(() => { if (statusWrapper) statusWrapper.classList.add('active'); }, 1400);
                
                setTimeout(() => {
                    if (splash) splash.style.opacity = '0';
                    setTimeout(() => {
                        if (splash) splash.style.display = 'none';
                        if (main) main.style.display = 'block';
                        initApp();
                    }, 400);
                }, 5000);
            }

            startSplash();
        })();
    </script>
</body>
</html>
