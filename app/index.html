<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="screen-home" class="screen active">
            <div class="logo">👑</div>
            <h1>Evseenko Majesty</h1>
            <p class="philosophy">от улицы к мастерству</p>
            
            <div class="balance-card">
                <button id="topupBtn" class="topup-btn">+ Пополнить баланс</button>
                <div class="balance-item">
                    <span class="balance-value" id="balance">0</span>
                    <span class="balance-label">₽ Баланс</span>
                </div>
                <div class="balance-item">
                    <span class="balance-value" id="bonus">0</span>
                    <span class="balance-label">🎁 Бонусы</span>
                </div>
            </div>
            
            <button id="themeBtn">🌙 Тёмная тема</button>
        </div>

        <div id="screen-settings" class="screen">
            <h1>Настройки</h1>
            <div class="setting-item">
                <span>Имя</span>
                <span id="userName">—</span>
            </div>
            <div class="setting-item">
                <span>Telegram ID</span>
                <span id="userId">—</span>
            </div>
        </div>

        <div class="nav-buttons">
            <button id="navHome">🏠 Главная</button>
            <button id="navSettings">⚙️ Настройки</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
