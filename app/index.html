<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evseenko Majesty</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --bg-primary: #FEFCF5;
        --text-primary: #1C1C1E;
        --text-secondary: #6C6C70;
        --accent: #C4A747;
        --accent-glow: rgba(196, 167, 71, 0.25);
    }

    body.dark {
        --bg-primary: #0C0C0E;
        --text-primary: #F5F5F7;
        --text-secondary: #9E9EA4;
        --accent: #D4AF37;
        --accent-glow: rgba(212, 175, 55, 0.3);
    }

    body.afterdark {
        --bg-primary: #04040C;
        --text-primary: #F0F0FC;
        --text-secondary: #A8A8C0;
        --accent: #E5C158;
        --accent-glow: rgba(229, 193, 88, 0.35);
    }

    body {
        font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        transition: background 0.3s ease;
        position: relative;
    }

    /* === ЕДИНЫЙ ПСЕВДОЭЛЕМЕНТ === */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        transition: background 0.5s ease;
        animation: pulseGlow 6s ease-in-out infinite;
    }

    /* СВЕТЛАЯ ТЕМА */
    body:not(.dark):not(.afterdark)::before {
        background: radial-gradient(circle at 50% 30%, rgba(196, 167, 71, 0.08) 0%, rgba(255, 252, 245, 0.9) 100%);
        opacity: 0.5;
    }

    /* ТЁМНАЯ ТЕМА */
    body.dark::before {
        background: radial-gradient(circle at 50% 40%, rgba(212, 175, 55, 0.1) 0%, rgba(12, 12, 14, 0.9) 100%);
        opacity: 0.4;
    }

    /* AFTERDARK */
    body.afterdark::before {
        background: radial-gradient(circle at 50% 40%, rgba(0, 120, 220, 0.18) 0%, rgba(4, 4, 12, 0.9) 100%);
        opacity: 0.45;
    }

    @keyframes pulseGlow {
        0% {
            opacity: 0.4;
        }
        50% {
            opacity: 0.85;
        }
        100% {
            opacity: 0.4;
        }
    }

    /* === ОСТАЛЬНЫЕ СТИЛИ === */
    .splash {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--bg-primary);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.6s ease;
    }

    .splash-content {
        text-align: center;
        max-width: 340px;
        padding: 20px;
        position: relative;
        z-index: 10;
    }

    .splash-logo-emoji {
        font-size: 100px;
        display: block;
        margin: 0 auto;
        text-align: center;
        opacity: 0;
        transform: scale(0.85) rotate(-5deg);
        transition: all 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        filter: drop-shadow(0 0 20px var(--accent-glow));
        line-height: 1;
    }

    .splash-logo-emoji.active {
        opacity: 1;
        transform: scale(1) rotate(0deg);
    }

    .splash-brand {
        margin-top: 8px;
        opacity: 0;
        transform: translateY(15px);
        transition: all 0.6s ease 0.1s;
    }

    .splash-brand.active {
        opacity: 1;
        transform: translateY(0);
    }

    .brand-name {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 6px;
        text-transform: uppercase;
        background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .afterdark-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 2.5px;
        margin-left: 10px;
        vertical-align: middle;
        color: var(--accent);
        background: var(--accent-glow);
        padding: 2px 10px;
        border-radius: 30px;
        opacity: 0;
        transform: scale(0.9);
        transition: all 0.4s ease 0.3s;
    }

    .afterdark-badge.active {
        opacity: 1;
        transform: scale(1);
    }

    .splash-tagline {
        margin-top: 48px;
        opacity: 0;
        transform: translateY(12px);
        transition: all 0.5s ease 0.2s;
    }

    .splash-tagline.active {
        opacity: 1;
        transform: translateY(0);
    }

    .tagline-primary {
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 1px;
        background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .tagline-secondary {
        font-size: 13px;
        opacity: 0.55;
        margin-top: 8px;
        letter-spacing: 0.3px;
        color: var(--text-secondary);
    }

    .splash-status {
        margin-top: 52px;
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-weight: 500;
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.4s ease 0.3s;
        color: var(--accent);
    }

    .splash-status.active {
        opacity: 1;
        transform: translateY(0);
    }

    .status-line {
        width: 45px;
        height: 2px;
        background: var(--accent);
        margin: 20px auto 0;
        opacity: 0;
        transform: scaleX(0);
        transition: all 0.5s ease 0.4s;
    }

    .status-line.active {
        opacity: 1;
        transform: scaleX(1);
    }

    .splash-copyright {
        position: absolute;
        bottom: 35px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 10px;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.5s ease 0.5s;
        color: var(--text-secondary);
    }

    .splash-copyright.active {
        opacity: 0.5;
        transform: translateY(0);
    }
</style>
</head>

<body>

<div class="container">
    <div id="logo" class="logo fade-up">EVSEENKO MAJESTY</div>
    <div id="afterdarkLabel" class="afterdark fade-up"></div>

    <div id="sloganMain" class="slogan-main fade-up"></div>
    <div id="sloganSub" class="slogan-sub fade-up"></div>

    <div id="status" class="status"></div>
</div>

<div id="systemLabel" class="bottom-left">MAJESTY SYSTEM</div>
<div id="modeLabel" class="bottom-right"></div>
<div id="footer" class="footer"></div>

<script>
const hour = new Date().getHours();

// Режим
let mode = "DAY";
if (hour >= 19) mode = "NIGHT";
if (hour >= 0 && hour < 6) mode = "AFTERDARK";

// Язык
const lang = navigator.language.startsWith('ru') ? 'ru' : 'en';

// Элементы
const body = document.body;
const afterdarkLabel = document.getElementById("afterdarkLabel");
const sloganMain = document.getElementById("sloganMain");
const sloganSub = document.getElementById("sloganSub");
const status = document.getElementById("status");
const footer = document.getElementById("footer");
const modeLabel = document.getElementById("modeLabel");

// Темы
if (mode === "DAY") {
    body.style.background = "#F4F6F8";
    body.style.color = "#111";
} else {
    body.style.background = "#0B0B0C";
    body.style.color = "#fff";
}

// AFTERDARK
if (mode === "AFTERDARK") {
    afterdarkLabel.textContent = "AFTERDARK";
}

// Язык
if (lang === "ru") {
    sloganMain.textContent = "Двигайся за пределами";
    sloganSub.textContent = "Drive Beyond Limits";
    status.textContent = mode === "AFTERDARK" ? "AFTERDARK АКТИВЕН" : "Система готова";
    footer.textContent = "Evseenko Majesty © 2026 — Все права защищены";
} else {
    sloganMain.textContent = "Drive Beyond Limits";
    sloganSub.textContent = "Двигайся за пределами";
    status.textContent = mode === "AFTERDARK" ? "AFTERDARK ACTIVE" : "System Ready";
    footer.textContent = "Evseenko Majesty © 2026 — All Rights Reserved";
}

// Режим подпись
modeLabel.textContent = mode === "AFTERDARK" ? "AFTERDARK" : "ONLINE";

// АНИМАЦИЯ ПО ЭТАПАМ
const elements = document.querySelectorAll(".fade-up");

elements.forEach((el, i) => {
    setTimeout(() => {
        el.classList.add("show");
    }, i * 250);
});

// Статус появляется отдельно (как уведомление)
setTimeout(() => {
    status.style.opacity = "1";
    status.style.transform = "translateY(0)";
    status.style.transition = "all 0.5s ease";
}, 1200);

// Переход дальше
setTimeout(() => {
    document.body.classList.add("fade-out");
}, 2400);

// Тут потом переход на главную
setTimeout(() => {
    console.log("OPEN MAIN APP");
}, 2900);

</script>

</body>
</html>
