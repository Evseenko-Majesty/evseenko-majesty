<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ========== БАЗОВЫЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* === ПЕРЕМЕННЫЕ СВЕТЛОЙ ТЕМЫ === */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #000000;
            --text-secondary: #8e8e93;
            --accent: #c4a747;
            --border: #e5e5ea;
        }

        /* === ТЁМНАЯ ТЕМА === */
        body.dark {
            --bg-primary: #0E1621;
            --bg-secondary: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --accent: #d4af37;
            --border: #2c2c30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.2s ease, color 0.2s ease;
        }

        /* === ЗАГРУЗОЧНЫЙ ЭКРАН === */
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .splash-content {
            text-align: center;
            padding: 20px;
        }

        .splash-logo {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .splash-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 4px;
        }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        .main {
            display: none;
            padding: 40px 20px;
            text-align: center;
        }

        .main h1 {
            font-size: 28px;
            margin-bottom: 16px;
        }

        .main p {
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <!-- ЗАГРУЗОЧНЫЙ ЭКРАН -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="splash-logo">👑</div>
            <div class="splash-title">EVSEENKO MAJESTY</div>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="main" class="main">
        <h1>Evseenko Majesty</h1>
        <p>Приложение готово к работе</p>
        <p style="margin-top: 20px; font-size: 12px;">Дальнейшие модули будут добавляться постепенно</p>
    </div>

    <script>
        (function() {
            // === TELEGRAM ===
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            
            // === ПРИМЕНЕНИЕ ТЕМЫ ===
            function applyTheme() {
                const theme = tg.colorScheme;
                if (theme === 'dark') {
                    document.body.classList.add('dark');
                } else {
                    document.body.classList.remove('dark');
                }
            }
            
            // === СЛУШАЕМ ИЗМЕНЕНИЕ ТЕМЫ ===
            tg.onEvent('themeChanged', () => {
                applyTheme();
            });
            
            // === АНИМАЦИЯ ЗАГРУЗКИ ===
            function startSplash() {
                applyTheme();
                
                const splash = document.getElementById('splash');
                const main = document.getElementById('main');
                
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        main.style.display = 'block';
                    }, 400);
                }, 1500);
            }
            
            startSplash();
        })();
    </script>
</body>
</html>
