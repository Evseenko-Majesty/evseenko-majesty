<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Evseenko Majesty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #000000;
            --text-secondary: #8e8e93;
            --accent: #c4a747;
            --border: #e5e5ea;
        }

        body.dark {
            --bg-primary: #0B0F14;
            --bg-secondary: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --accent: #d4af37;
            --border: #2c2c30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .splash-content {
            text-align: center;
            padding: 20px;
        }

        .splash-logo {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .splash-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 4px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px 80px 16px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            border: 0.5px solid var(--border);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-primary);
            border-top: 0.5px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px 16px;
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 30px;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid var(--border);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .lang-buttons {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        .splash-copyright {
    position: absolute;
    bottom: 20px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s ease 0.3s;
    color: var(--text-secondary);
    letter-spacing: 0.3px;
}

.splash-copyright.active {
    opacity: 0.4;
    transform: translateY(0);
}
    </style>
</head>
<body>
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="splash-logo">👑</div>
            <div class="splash-title">EVSEENKO MAJESTY</div>
            <div class="splash-copyright" id="splashCopyright">
    <div>Evseenko Majesty © 2026 Все права защищены</div>
        </div>
    </div>

    <div id="main" style="display: none;">
        <div class="container">
            <div class="screen active" id="screen-home">
                <div class="card">
                    <h1>Главная</h1>
                </div>
            </div>

            <div class="screen" id="screen-settings">
                <div class="card">
                    <h1>Настройки</h1>
                    <div class="setting-item">
                        <span>🌐 Язык / Language</span>
                        <div class="lang-buttons">
                            <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
                            <button class="lang-btn" data-lang="en">🇬🇧 English</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" data-screen="home">🏠 Главная</button>
            <button class="nav-item" data-screen="settings">⚙️ Настройки</button>
        </div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();

            // === ЯЗЫК ===
            let currentLang = localStorage.getItem('app_lang') || detectLanguage();

            function detectLanguage() {
                const tgLang = tg.initDataUnsafe?.user?.language_code || 'en';
                return tgLang === 'ru' ? 'ru' : 'en';
            }
function updateLanguage() {
    const texts = {
        ru: {
            home: 'Главная',
            settingsTitle: 'Настройки',
            language: '🌐 Язык / Language',
            navHome: 'Главная',
            navSettings: 'Настройки'
        },
        en: {
            home: 'Home',
            settingsTitle: 'Settings',
            language: '🌐 Language / Язык',
            navHome: 'Home',
            navSettings: 'Settings'
        },
        const copyrightText = document.getElementById('splashCopyright');
if (copyrightText) {
    const text = currentLang === 'ru' 
        ? 'Evseenko Majesty © 2026 Все права защищены'
        : 'Evseenko Majesty © 2026 All Rights Reserved';
    copyrightText.innerHTML = `<div>${text}</div>`;
}
    };
    
    const t = texts[currentLang];
    
    // Заголовки экранов
    document.getElementById('screen-home').querySelector('h1').innerText = t.home;
    document.getElementById('screen-settings').querySelector('h1').innerText = t.settingsTitle;
    document.querySelector('.setting-item span').innerText = t.language;
    
    // Нижняя навигация
    const navItems = document.querySelectorAll('.nav-item');
    if (navItems.length >= 2) {
        navItems[0].innerHTML = '🏠 ' + t.navHome;
        navItems[1].innerHTML = '⚙️ ' + t.navSettings;
    }
    
    // Обновляем активную кнопку языка
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.lang === currentLang) btn.classList.add('active');
    });
}
            

            function setLanguage(lang) {
                currentLang = lang;
                localStorage.setItem('app_lang', lang);
                updateLanguage();
            }

            // === ТЕМА ===
            function applyTheme() {
                const theme = tg.colorScheme;
                if (theme === 'dark') {
                    document.body.classList.add('dark');
                } else {
                    document.body.classList.remove('dark');
                }
            }

            tg.onEvent('themeChanged', () => applyTheme());

            // === НАВИГАЦИЯ ===
            function goToScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(`screen-${screenId}`).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.screen === screenId) btn.classList.add('active');
                });
            }

            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => goToScreen(btn.dataset.screen));
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            });

            // === ЗАГРУЗКА ===
            function startSplash() {
                applyTheme();
                updateLanguage();
                
                const splash = document.getElementById('splash');
                const main = document.getElementById('main');
                
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        main.style.display = 'block';
                    }, 400);
                }, 5000);
            }
            setTimeout(() => {
    const copyright = document.getElementById('splashCopyright');
    if (copyright) copyright.classList.add('active');
}, 3500);

            startSplash();
        })();
    </script>
</body>
</html>
