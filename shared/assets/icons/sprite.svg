<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  
  <!-- ЗАГРУЗКА -->
  <symbol id="status-loading" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
      <path stroke-dasharray="16" stroke-dashoffset="16" d="M12 3c4.97 0 9 4.03 9 9">
        <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.3s" values="16;0"/>
        <animateTransform attributeName="transform" dur="1.5s" repeatCount="indefinite" type="rotate" values="0 12 12;360 12 12"/>
      </path>
      <path stroke-dasharray="64" stroke-dashoffset="64" stroke-opacity=".3" d="M12 3c4.97 0 9 4.03 9 9c0 4.97 -4.03 9 -9 9c-4.97 0 -9 -4.03 -9 -9c0 -4.97 4.03 -9 9 -9Z">
        <animate fill="freeze" attributeName="stroke-dashoffset" dur="1.2s" values="64;0"/>
      </path>
    </g>
  </symbol>
  
  <!-- УСПЕХ -->
  <symbol id="status-success" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
      <path d="M3 12c0 -4.97 4.03 -9 9 -9c4.97 0 9 4.03 9 9c0 4.97 -4.03 9 -9 9c-4.97 0 -9 -4.03 -9 -9Z">
        <animate fill="freeze" attributeName="fill-opacity" dur="0.15s" values="0;0.3"/>
      </path>
      <path stroke-dasharray="14" stroke-dashoffset="14" d="M8 12l3 3l5 -5">
        <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.15s" dur="0.2s" values="14;0"/>
      </path>
    </g>
  </symbol>
  
  <!-- ОШИБКА -->
  <symbol id="status-error" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
      <path d="M12 3c4.97 0 9 4.03 9 9c0 4.97 -4.03 9 -9 9c-4.97 0 -9 -4.03 -9 -9c0 -4.97 4.03 -9 9 -9Z">
        <animate fill="freeze" attributeName="fill-opacity" begin="0.6s" dur="0.15s" values="0;0.3"/>
        <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="64;0"/>
      </path>
      <path stroke-dasharray="8" stroke-dashoffset="8" d="M12 12l4 4M12 12l-4 -4M12 12l-4 4M12 12l4 -4">
        <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.75s" dur="0.2s" values="8;0"/>
      </path>
    </g>
  </symbol>
  
</svg>
