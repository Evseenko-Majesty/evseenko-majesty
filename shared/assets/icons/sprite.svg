<!-- 
  ============================================
  SPRITE SVG — ВСЕ ИКОНКИ В ОДНОМ ФАЙЛЕ
  Подключается один раз, используется везде через <use href="#id">
  ============================================
-->

<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  
  <!-- 
    ИКОНКА ЗАГРУЗКИ
    Круг с анимированным штрихом (вращается)
    Цвет наследуется через currentColor 
  -->
  <symbol id="status-loading" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="32" stroke-linecap="round">
      <!-- Анимация вращения штриха -->
      <animate attributeName="stroke-dashoffset" from="0" to="64" dur="1.5s" repeatCount="indefinite" />
    </circle>
  </symbol>
  
  <!-- 
    ИКОНКА УСПЕХА
    Круг с галочкой внутри 
  -->
  <symbol id="status-success" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
    <path d="M8 12L11 15L16 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </symbol>
  
  <!-- 
    ИКОНКА ОШИБКИ
    Круг с крестиком внутри 
  -->
  <symbol id="status-error" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
    <path d="M15 9L9 15M9 9L15 15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
  </symbol>
  
</svg>
